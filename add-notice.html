<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPITINIHUB - Post Notice</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="nav-content">
            <div class="logo">
                <span class="logo-text normal">CAPITINI</span><span class="logo-text bold">HUB</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Notices</a>
                <a href="movies.html">Movies</a>
                <a href="add-notice.html" class="active admin-link">+ Post Notice</a>
            </div>
        </div>
    </nav>

    <main class="notice-main">
        <h1 class="page-title">Draft an Announcement</h1>
        
        <div class="input-container-card">
            <div class="notice-controls">
                <input type="text" id="noticeTitleInput" placeholder="Notice Title (e.g., Kitchen Duty)" autocomplete="off">
                <textarea id="noticeContentInput" placeholder="What's the announcement?..."></textarea>
                <button id="addNoticeBtn" class="pill-btn add-btn">Pin to Notice Board</button>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
