<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPITINIHUB - Movies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <span class="normal">CAPITINI</span><span class="bold">HUB</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Notices</a>
            <a href="movies.html" class="active">Movies</a>
        </div>
    </nav>

    <main>
        <h1 class="page-title">Movie Night</h1>
        
        <div class="movie-controls">
            <input type="text" id="movieInput" placeholder="Propose a movie..." autocomplete="off">
            <button id="addMovieBtn">Submit</button>
        </div>

        <div class="movies-layout">
            <div class="list-section">
                <ul id="movieList" class="minimal-list">
                    </ul>
            </div>

            <div class="picker-section">
                <button id="pickRandomBtn" class="giant-btn">ROLL THE DICE</button>
                <div id="resultDisplay" class="result-text"></div>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
