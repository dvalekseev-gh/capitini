<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPITINIHUB - Movies</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="nav-content">
            <div class="logo">
                <span class="logo-text normal">capitini</span><span class="logo-text bold">hub</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Posts</a>
                <a href="movies.html" class="active">Movies</a>
                <a href="add-notice.html" class="admin-link">+ Post</a>
            </div>
        </div>
    </nav>

    <main class="movie-main">
        <h1 class="page-title">Movie proposals</h1>
        
        <div class="input-container-card">
            <div class="movie-controls">
                <input type="text" id="movieInput" placeholder="Propose a movie" autocomplete="off">
                <button id="addMovieBtn" class="pill-btn add-btn">Add</button>
            </div>
        </div>

        <div class="movies-flow-layout">
            <div class="list-section-card">
                <h3>Current proposals:</h3>
                <ul id="movieList" class="village-list">
                    </ul>
            </div>

            <div class="picker-section-card">
                <div class="picker-container">
                    <button id="pickRandomBtn" class="giant-pill-btn pick-btn">Roll the dice</button>
                    <div id="resultDisplay" class="result-display-area"></div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
