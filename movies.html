<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dorm Hub - Movies</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>🏠 Dorm Hub</h1>
        <ul>
            <li><a href="index.html">Notice Board</a></li>
            <li><a href="movies.html" class="active">Movie Night</a></li>
        </ul>
    </nav>

    <main>
        <h2>🍿 Propose a Movie</h2>
        
        <div class="movie-controls">
            <input type="text" id="movieInput" placeholder="Enter a movie title...">
            <button id="addMovieBtn">Add to List</button>
        </div>

        <div class="list-container">
            <h3>Current Proposals:</h3>
            <ul id="movieList">
                </ul>
        </div>

        <hr>

        <div class="random-picker">
            <h2>🎲 Can't Decide?</h2>
            <button id="pickRandomBtn" class="primary-btn">Pick a Random Movie!</button>
            <h3 id="resultDisplay"></h3>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
